name: PR Preview Deploy
on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./bgg-board-game-picker
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: ./bgg-board-game-picker
        run: npm run build -- --base-href /bgg-board-game-picker/pr-${{ github.event.number }}/

      - name: Deploy preview to gh-pages subdirectory
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: ./bgg-board-game-picker/dist/bgg-board-game-picker/browser
          target-folder: pr-${{ github.event.number }}
          clean: false

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Preview deployed!**\n\nhttps://tjreinert.github.io/bgg-board-game-picker/pr-${{ github.event.number }}/'
            })

permissions:
  contents: write
  pull-requests: write
